<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termék részletek</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="menu">
        <ul>
            <li onclick="window.location.href='index.html'">Főoldal</li>
            <li onclick="window.location.href='cart.html'" class="cart-menu">
                Kosár <span id="cart-count">(0)</span>
            </li>
        </ul>
    </nav>

    <main class="product-page">
        <div class="product-image">
            <img id="product-img" src="" alt="">
        </div>

        <div class="product-info">
            <h1 id="product-name"></h1>
            <p id="product-price" class="price"></p>
            <p id="product-desc" class="description"></p>

            <div class="size-selection">
                <h3>Válassz méretet:</h3>
                <div id="size-options" class="size-options"></div>
            </div>

            <button class="add-to-cart">Kosárba</button>
        </div>
    </main>

    <div class="shipping-banner">
        <span>🚚 10.000 Ft felett <strong>INGYENES</strong> a szállítás!</span>
    </div>

    <script src="products_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
