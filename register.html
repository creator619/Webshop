<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="menu">
        <ul>
            <li onclick="window.location.href='index.html'">Főoldal</li>
            <li onclick="window.location.href='login.html'">Bejelentkezés</li>
        </ul>
    </nav>

    <main class="auth-page">
        <h1>Regisztráció</h1>

        <div class="auth-container">
            <label>Név</label>
            <input type="text" id="reg-name">

            <label>E-mail</label>
            <input type="email" id="reg-email">

            <label>Jelszó</label>
            <input type="password" id="reg-password">

            <button class="auth-btn" id="register-btn">Regisztráció</button>
        </div>
    </main>

    <div class="shipping-banner">
        <span>🚚 10.000 Ft felett <strong>INGYENES</strong> a szállítás!</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
